# Pin Node 20 and skip the auto-detected workspace-per-service trap.
# This config is read by Railway's Nixpacks builder.

[phases.setup]
nixPkgs = ['nodejs_20', 'npm-10_x']

[phases.install]
# --include=dev forces devDependencies (like Vite, the frontend build tool) to
# install even when NODE_ENV=production is set on the Railway service.
cmds = ['npm install --include=dev']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm start'
