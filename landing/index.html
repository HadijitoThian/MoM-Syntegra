  <style>
    :root { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    html { scroll-behavior: smooth; }
    [data-acc-body] { display: none; }
    [data-acc].open [data-acc-body] { display: block; }
    [data-acc].open [data-acc-icon] { transform: rotate(45deg); }

    /* ---- Logo (full color over light hero) ---- */
    .brand-logo { height: 40px; width: auto; display: block; }
    @media (max-width: 640px) { .brand-logo { height: 34px; } }
    .footer-logo { height: 30px; width: auto; display: block; }

    /* ---- Navbar: transparent (dark text) over light hero, solid white on scroll ---- */
    #site-header { background: transparent; border-bottom: 1px solid transparent; transition: background .3s ease, box-shadow .3s ease, border-color .3s ease; }
    #site-header .nav-link, #site-header .brand-txt { color: #1e293b; transition: color .3s ease; }
    #site-header .nav-link:hover { color: #2563eb; }
    #site-header .lang-toggle { border-color: #cbd5e1; }
    #site-header .nav-cta-btn { background: #2563eb; color: #fff; }
    #site-header.scrolled { background: rgba(255,255,255,.92); backdrop-filter: blur(12px); box-shadow: 0 6px 24px -12px rgba(15,23,42,.22); border-bottom: 1px solid #e2e8f0; }
    section[id] { scroll-margin-top: 88px; }

    /* ---- Hero (light, blue mood) ---- */
    .hero-img {
      object-position: 82% center;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 32%, #000 100%);
              mask-image: linear-gradient(to right, transparent 0%, #000 32%, #000 100%);
    }
    @media (min-width: 1024px) {
      .hero-img {
        object-position: right center;
        transform: scale(1.06);
        transform-origin: right center;
        -webkit-mask-image: linear-gradient(to right, transparent 6%, #000 40%, #000 100%);
                mask-image: linear-gradient(to right, transparent 6%, #000 40%, #000 100%);
      }
    }
    .hero-overlay { background: linear-gradient(to right, rgba(239,246,255,.85) 0%, rgba(239,246,255,.55) 24%, rgba(239,246,255,.18) 46%, rgba(239,246,255,0) 64%); }
    .hf-ic { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #bfdbfe; background: #fff; box-shadow: 0 4px 14px -6px rgba(37,99,235,.28); display: grid; place-items: center; font-size: 1.15rem; flex-shrink: 0; }

    /* ---- Floating notification cards ---- */
    .fcard { animation: floatY 5s ease-in-out infinite; will-change: transform; }
    .fc-pop { opacity: 0; transform: translateY(16px) scale(.85); animation: popIn .7s cubic-bezier(.18,1.12,.45,1) forwards; }
    .fcard-1 .fc-pop { animation-delay: .25s; } .fcard-2 .fc-pop { animation-delay: .65s; } .fcard-3 .fc-pop { animation-delay: 1.05s; }
    .fcard-2 { animation-delay: 1.5s; } .fcard-3 { animation-delay: .7s; }
    @keyframes popIn { to { opacity: 1; transform: none; } }
    @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-11px); } }
    @media (max-width: 980px) {
      .hero-overlay { background: linear-gradient(to bottom, rgba(239,246,255,.95) 0%, rgba(239,246,255,.78) 38%, rgba(239,246,255,.55) 100%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fcard { animation: none; } .fc-pop { animation: none; opacity: 1; transform: none; }
    }

    /* ---- Logo strip marquee ---- */
    .marquee {
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent);
              mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent);
    }
    .marquee-track { display: flex; width: max-content; align-items: center; animation: marquee 34s linear infinite; }
    .marquee:hover .marquee-track { animation-play-state: paused; }
    .logo-item {
      flex-shrink: 0; padding: 0 2.4rem; font-size: 1.45rem; font-weight: 700; letter-spacing: -.01em;
      color: #94a3b8; white-space: nowrap; transition: color .2s ease;
    }
    .logo-item:hover { color: #2563eb; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @media (prefers-reduced-motion: reduce) { .marquee-track { animation: none; } }

    /* ================= DARK MODE ================= */
    html.dark body { background-color: #0b1220; color: #e2e8f0; }
    /* surfaces */
    html.dark .bg-white { background-color: #111827 !important; }
    html.dark .bg-slate-50 { background-color: #0b1220 !important; }
    html.dark .bg-slate-100 { background-color: #1f2937 !important; }
    html.dark .bg-blue-100 { background-color: #1e3a8a !important; }
    /* text */
    html.dark .text-slate-900 { color: #f1f5f9 !important; }
    html.dark .text-slate-800 { color: #e2e8f0 !important; }
    html.dark .text-slate-700 { color: #cbd5e1 !important; }
    html.dark .text-slate-600 { color: #cbd5e1 !important; }
    html.dark .text-slate-500 { color: #94a3b8 !important; }
    html.dark .text-slate-400 { color: #94a3b8 !important; }
    html.dark .text-blue-700 { color: #93c5fd !important; }
    /* borders */
    html.dark .border-slate-200 { border-color: #1f2937 !important; }
    html.dark .border-slate-300 { border-color: #334155 !important; }
    html.dark .border-y { border-color: #1f2937 !important; }
    html.dark .divide-slate-200 > :not([hidden]) ~ :not([hidden]) { border-color: #1f2937 !important; }
    /* gradient section backgrounds */
    html.dark .from-slate-50 { --tw-gradient-from: #0b1220 var(--tw-gradient-from-position) !important; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgb(11 18 32 / 0)) !important; }
    html.dark .from-white { --tw-gradient-from: #0b1220 var(--tw-gradient-from-position) !important; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgb(11 18 32 / 0)) !important; }
    html.dark .to-white { --tw-gradient-to: #0b1220 var(--tw-gradient-to-position) !important; }
    html.dark .to-slate-50 { --tw-gradient-to: #0b1220 var(--tw-gradient-to-position) !important; }

    /* Keep HERO light (bright illustration → dark text in both modes) */
    html.dark #beranda .text-slate-900 { color: #0f172a !important; }
    html.dark #beranda .text-slate-700,
    html.dark #beranda .text-slate-600 { color: #334155 !important; }
    html.dark #beranda .bg-white { background-color: #fff !important; }
    html.dark #beranda .bg-blue-100 { background-color: #dbeafe !important; }
    html.dark #beranda .text-blue-700 { color: #1d4ed8 !important; }
    html.dark #beranda .border-slate-300 { border-color: #cbd5e1 !important; }

    /* Navbar (scrolled) in dark */
    html.dark #site-header.scrolled { background: rgba(15,23,42,.9) !important; border-bottom-color: #1f2937; box-shadow: 0 6px 24px -12px rgba(0,0,0,.6); }
    html.dark #site-header.scrolled .nav-link, html.dark #site-header.scrolled .brand-txt { color: #e2e8f0; }
    html.dark #site-header.scrolled .brand-logo { filter: brightness(0) invert(1); }
    html.dark #site-header.scrolled .lang-toggle { border-color: #334155; }
    /* Footer logo visible on dark */
    html.dark footer .footer-logo { filter: brightness(0) invert(1); }
  </style>

        b.className = 'lang-btn px-2.5 py-1 transition ' + (active ? 'bg-blue-600 text-white' : 'nav-link opacity-70 hover:opacity-100');
